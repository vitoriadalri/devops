services:
  app:
    build:
      context: .
    image: devops-fase1:local
    container_name: devops-fase1-app
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
